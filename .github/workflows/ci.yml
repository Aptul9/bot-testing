name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint + Types + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Sync (no dev deps skipped)
        run: uv sync --frozen

      - name: Ruff format check
        run: uv run ruff format --check

      - name: Ruff lint
        run: uv run ruff check

      - name: Mypy strict
        run: uv run mypy

      - name: Pytest
        run: uv run pytest -q

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: waf-bots:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke - container --version + dry-run BOT-1
        run: |
          docker run --rm waf-bots:ci --version
          docker run --rm waf-bots:ci --bot bot-1-dos --duration 1 \
            | python -c "import json,sys; d=json.load(sys.stdin); assert d['bot']=='bot-1-dos' and d['metadata']['dry_run'] is True; print('smoke OK', d['requests_total'], 'requests')"
